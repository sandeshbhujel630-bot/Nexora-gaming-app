<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Gaming | Official App</title>
    <style>
        body {
            background-color: #0f1216;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container { padding: 20px; max-width: 600px; }
        h1 { color: #ff9800; font-size: 3rem; margin-bottom: 10px; }
        p { color: #b0b0b0; font-size: 1.2rem; }
        .download-btn {
            background-color: #ff9800;
            color: #000;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            display: inline-block;
            margin-top: 30px;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3);
            transition: 0.3s;
        }
        .download-btn:hover { transform: scale(1.05); background-color: #ffa726; }
        .update-box {
            background: #1c1f26;
            border-left: 5px solid #ff9800;
            padding: 20px;
            margin-top: 40px;
            text-align: left;
            border-radius: 8px;
        }
        .version { color: #ff9800; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>NEXORA GAMING</h1>
        <p>Nepal's Ultimate Gaming & Topup Platform</p>
        
        <a href="#" class="download-btn">DOWNLOAD APK (v2.0)</a>

        <div class="update-box">
            <div class="version">What's New in v2.0:</div>
            <ul>
                <li>Wallet System with QR Scanner 💳</li>
                <li>New Interactive Notice Board 📢</li>
                <li>Detailed Tournament Rewards (1-20) 🏆</li>
                <li>Performance Improvements & Bug Fixes 🛠️</li>
            </ul>
        </div>

        <p style="margin-top: 50px; font-size: 0.9rem; color: #666;">© 2026 Nexora Gaming. All rights reserved.</p>
    </div>
</body>
</html>
